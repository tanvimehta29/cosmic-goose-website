# Site settings
title: "PitCrew Robotics"
description: "https://github.com/braineatingmachines/pitcrew"
url: ""
baseurl: ""

# Team configuration
site:
  team_name: "PitCrew"
  team_number: "271828"
  program: "FTC"  # FTC or FRC
  current_season: "2025-2026"
  logo: "/assets/images/placeholder.svg"

# Theme configuration - Official FTC Colors
# Edit colors here. Changes take effect after restarting Jekyll (no CSS rebuild needed).
theme:
  colors:
    # Brand colors
    primary: "#003974"              # Deep Blue
    primary_highlight: "#002855"    # Darker blue (hover states, gradient end)
    primary_darkest: "#001a3d"      # Very dark navy (hero gradient end)
    secondary: "#F57E25"            # FIRST Orange (brand color)
    secondary_highlight: "#d96a1f"  # Darker orange (hover states)
    # Semantic colors
    success: "#28a745"
    info: "#17a2b8"
    warning: "#f0b37e"
    danger: "#dc3545"
    # Sponsor tier border colors
    sponsor_platinum: "#9ca3af"
    sponsor_gold: "#eab308"
    sponsor_silver: "#d1d5db"
    sponsor_bronze: "#92400e"
  dark_mode: true

# Startup wizard — set to false after completing initial setup
startup_wizard: true

# Features toggle
features:
  blog: true
  docs: true
  cad_viewer: true
  circuit_viewer: true
  code_links: true
  data_visualizations: true
  alumni_auto_archive: true
  accessibility_toggle: true
  search: true

# Navigation
navigation:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Season
    url: /season/
  - title: Awards
    url: /awards/
  - title: Sponsors
    url: /sponsors/
  - title: Docs
    url: /docs/
  - title: News
    url: /news/

# Social links
socials:
  instagram: "https://instagram.com/teamrobotics"
  github: "https://github.com/teamrobotics"
  youtube: "https://youtube.com/@teamrobotics"
  twitter: "https://twitter.com/teamrobotics"
  email: "team@example.com"

# Fundraising/Donations
fundraising:
  enabled: false
  url: ""
  text: "Support Our Team"

# Collections
collections:
  posts:
    output: true
    permalink: /news/:year/:month/:day/:title/
  seasons:
    output: true
    permalink: /seasons/:path/
  docs:
    output: true
    permalink: /docs/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "seasons"
    values:
      layout: "season"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "docs"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - package.json
  - package-lock.json
  - tailwind.config.js
  - README.md
  - scripts
  - "*.py"
  - requirements.txt
