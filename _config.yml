# Site settings
title: "Cosmic Goose"
description: "HI! We're 8902 Cosmic Goose, a FTC team from Glen Rock, NJ. "
url: ""
baseurl: ""

# Team configuration
site:
  team_name: "Cosmic Goose"
  team_number: "8902"
  program: "FTC"
  current_season: "2025-2026"
  logo: "/assets/images/placeholder.svg"

# Theme configuration
# Edit colors here. Changes take effect after restarting Jekyll.
theme:
  colors:
    # Brand colors
    primary: "#7400b0"
    primary_highlight: "#550080"
    primary_darkest: "#220033"
    secondary: "#c6a0f3"
    secondary_highlight: "#aa72ee"
    # Semantic colors
    success: "#28a745"
    info: "#17a2b8"
    warning: "#f0b37e"
    danger: "#dc3545"
    # Sponsor tier border colors
    sponsor_platinum: "#9ca3af"
    sponsor_gold: "#eab308"
    sponsor_silver: "#d1d5db"
    sponsor_bronze: "#92400e"
  dark_mode: false

# Features toggle
features:
  blog: true
  docs: true
  cad_viewer: true
  circuit_viewer: false
  code_links: true
  data_visualizations: true
  alumni_auto_archive: true
  accessibility_toggle: false
  search: true

# Navigation
navigation:
  - title: "Home"
    url: "/"
  - title: "About"
    url: "/about/"
  - title: "Season"
    url: "/season/"
  - title: "Awards"
    url: "/awards/"
  - title: "Sponsors"
    url: "/sponsors/"
  - title: "News"
    url: "/news/"
  - title: "Log"
    url: "/log/"

# Social links
socials:
  instagram: "https://www.instagram.com/cosmicgoose8902?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
  github: ""
  youtube: ""
  twitter: ""
  email: ""

# Fundraising/Donations
fundraising:
  enabled: true
  url: ""
  text: "Support Our Team"

# Startup wizard — set to false after initial setup
startup_wizard: false

# Collections
collections:
  posts:
    output: true
    permalink: /news/:year/:month/:day/:title/
  seasons:
    output: true
    permalink: /seasons/:path/
  docs:
    output: true
    permalink: /docs/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "seasons"
    values:
      layout: "season"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "docs"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - package.json
  - package-lock.json
  - tailwind.config.js
  - README.md
  - scripts
  - "*.py"
  - requirements.txt
